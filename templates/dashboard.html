{% extends 'base.html' %}
<!-- herda o layout principal do sistema -->

{% block content %}
<!-- início do conteúdo da página -->

<h2 class="mb-4">Dashboard Financeiro</h2>
<!-- título principal -->

<div class="row">
<!-- linha para organizar os cartões -->

<div class="col-md-4">
<div class="card text-white bg-success mb-3">
<div class="card-body">

<h5 class="card-title">Saldo Atual</h5>
<!-- título do cartão -->

<h3>R$ {{ saldo }}</h3>
<!-- valor do saldo atual vindo do backend -->

</div>
</div>
</div>


<div class="col-md-4">
<div class="card text-white bg-primary mb-3">
<div class="card-body">

<h5 class="card-title">Receitas</h5>
<!-- título -->

<h3>R$ {{ receitas }}</h3>
<!-- total de receitas -->

</div>
</div>
</div>


<div class="col-md-4">
<div class="card text-white bg-danger mb-3">
<div class="card-body">

<h5 class="card-title">Despesas</h5>
<!-- título -->

<h3>R$ {{ despesas }}</h3>
<!-- total de despesas -->

</div>
</div>
</div>

</div>



<!-- SALDO FUTURO -->
<div class="card mt-4">
<div class="card-body">

<h5 class="card-title">Saldo Futuro (Previsão)</h5>
<!-- título da previsão -->

<h3>R$ {{ saldo_futuro }}</h3>
<!-- valor calculado no backend -->

</div>
</div>

<!-- ALERTAS -->
{% if alerta %}

<div class="alert alert-warning mt-3">
<!-- exibe alerta quando existir -->

{{ alerta }}
<!-- mensagem dinâmica vinda do backend -->

</div>

{% endif %}

<!-- GRÁFICO -->
<div class="card mt-4">
<div class="card-body">

<h5 class="card-title">Resumo Financeiro</h5>
<!-- título do gráfico -->

<canvas id="graficoFinanceiro"></canvas>
<!-- área onde o gráfico será desenhado -->

</div>
</div>


<!-- SCRIPT CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- importa a biblioteca de gráficos -->

<script>

const ctx = document.getElementById('graficoFinanceiro').getContext('2d');
// seleciona o canvas

const grafico = new Chart(ctx, {

type: 'bar',
// define tipo do gráfico (barra)

data: {

labels: ['Receitas', 'Despesas'],
// rótulos do gráfico

datasets: [{

label: 'Resumo Financeiro',
// legenda

data: [{{ receitas }}, {{ despesas }}],
// valores vindos do Django

backgroundColor: [
'rgba(54, 162, 235, 0.7)',
// cor receitas

'rgba(255, 99, 132, 0.7)'
// cor despesas
],

borderColor: [
'rgba(54, 162, 235, 1)',
'rgba(255, 99, 132, 1)'
],

borderWidth: 1

}]

},

options: {

responsive: true,
// gráfico responsivo

scales: {

y: {

beginAtZero: true
// eixo começa do zero

}

}

}

});

</script>

{% endblock %}
