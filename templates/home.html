<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema Financeiro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: linear-gradient(135deg, #396afc, #2948ff);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card-auth {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* INPUT */
.form-control {
    margin-bottom: 10px;
    transition: 0.2s;
}

.form-control:focus {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

/* BOTÃO */
.btn-premium {
    background: linear-gradient(135deg, #11998e, #38ef7d);
    border: none;
    color: white;
}

/* ESCONDER */
.hidden {
    display: none;
}

</style>

</head>

<body>

<div class="card-auth">

<h3 class="mb-4">Bem-vindo 👋</h3>

<div id="mensagem"></div>

<!-- LOGIN -->
<form id="formLogin">

<input type="text" name="username" class="form-control" placeholder="Usuário" required>

<input type="password" name="password" class="form-control" placeholder="Senha" required>

<button class="btn btn-primary w-100 mt-2">Entrar</button>

</form>

<!-- CADASTRO -->
<form id="formCadastro" class="hidden">

<input type="text" name="username" class="form-control" placeholder="Usuário" required>

<input type="email" name="email" class="form-control" placeholder="Email" required>

<input type="password" name="password" class="form-control" placeholder="Senha" required>

<!-- VIA CEP -->
<input type="text" id="cep" class="form-control" placeholder="CEP">

<input type="text" id="endereco" class="form-control" placeholder="Endereço">

<input type="text" id="cidade" class="form-control" placeholder="Cidade">

<input type="text" id="estado" class="form-control" placeholder="Estado">

<button class="btn btn-premium w-100 mt-2">Cadastrar</button>

</form>

<p class="mt-3">
<a href="#" onclick="toggleForm()">Criar conta</a>
</p>

</div>

<!-- MODAL LGPD -->
<div class="modal fade" id="modalLGPD" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Termos de Uso</h5>
      </div>

      <div class="modal-body">
        <p>
        Seus dados serão utilizados apenas para controle financeiro pessoal.
        Não compartilhamos suas informações com terceiros.
        </p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="aceitarTermos()">
            Aceitar e continuar
        </button>
      </div>

    </div>
  </div>
</div>
>
<!-- SCRIPTS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

// CSRF
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}

// ELEMENTOS
const loginForm = document.getElementById("formLogin");
const cadastroForm = document.getElementById("formCadastro");
const mensagem = document.getElementById("mensagem");

let aceitouLGPD = false;

// TOGGLE FORM
function toggleForm(){
    loginForm.classList.toggle("hidden");
    cadastroForm.classList.toggle("hidden");
}


// LOGIN
loginForm.addEventListener("submit", function(e){

    e.preventDefault();

    const formData = new FormData(loginForm);

    fetch("/api/login/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            window.location.href = "/dashboard/";
        } else {
            mensagem.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }

    });

});


// CADASTRO
cadastroForm.addEventListener("submit", function(e){

    e.preventDefault();

    if(!aceitouLGPD){
        const modal = new bootstrap.Modal(document.getElementById('modalLGPD'));
        modal.show();
        return;
    }

    const formData = new FormData(cadastroForm);
    formData.append("aceitou", true);

    fetch("/api/cadastro/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            window.location.href = "/dashboard/";
        } else {
            mensagem.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }

    });

});

// ACEITAR LGPD
function aceitarTermos(){
    aceitouLGPD = true;
    const modal = bootstrap.Modal.getInstance(document.getElementById('modalLGPD'));
    modal.hide();
}


// VIA CEP
document.getElementById('cep').addEventListener('blur', function(){

    const cep = this.value;

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(data => {

        document.getElementById('endereco').value = data.logradouro || "";
        document.getElementById('cidade').value = data.localidade || "";
        document.getElementById('estado').value = data.uf || "";

    });

});

</script>

</body>
</html>
