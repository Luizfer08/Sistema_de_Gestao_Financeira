<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema Financeiro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: linear-gradient(135deg, #396afc, #2948ff);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card-auth {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* ESCONDER FORM */
.hidden {
    display: none;
}

</style>

</head>

<body>

<div class="card-auth">

<h3 class="text-center mb-3">Sistema Financeiro</h3>

<div id="mensagem"></div>


<!-- LOGIN -->
<form id="formLogin">

<input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>

<input type="password" name="password" class="form-control mb-2" placeholder="Senha" required>

<button class="btn btn-primary w-100">Entrar</button>

</form>


<!-- CADASTRO -->
<form id="formCadastro" class="hidden">

<!-- usuário -->
<input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>

<!-- email -->
<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

<!-- senha -->
<input type="password" name="password" class="form-control mb-2" placeholder="Senha" required>


<!-- VIA CEP  -->
<input type="text" id="cep" class="form-control mb-2" placeholder="CEP">

<input type="text" id="endereco" class="form-control mb-2" placeholder="Endereço">

<input type="text" id="cidade" class="form-control mb-2" placeholder="Cidade">

<input type="text" id="estado" class="form-control mb-2" placeholder="Estado">

<!-- LGPD (CHECKBOX) -->
<div class="form-check text-start mb-2">
    <input class="form-check-input" type="checkbox" id="termos">
    <label class="form-check-label">
        Aceito os termos de uso
    </label>
</div>

<button class="btn btn-success w-100">Cadastrar</button>

</form>


<!-- BOTÃO TROCA -->
<p class="text-center mt-3">

<a href="#" onclick="toggleForm()" id="toggleText">
Criar conta
</a>

</p>

</div>

<script>


// CSRF
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}


// ELEMENTOS
const loginForm = document.getElementById("formLogin");
const cadastroForm = document.getElementById("formCadastro");
const mensagem = document.getElementById("mensagem");
const toggleText = document.getElementById("toggleText");


// TOGGLE LOGIN/CADASTRO
function toggleForm(){

    loginForm.classList.toggle("hidden");
    cadastroForm.classList.toggle("hidden");

    if(loginForm.classList.contains("hidden")){
        toggleText.innerText = "Já tenho conta";
    } else {
        toggleText.innerText = "Criar conta";
    }
}


// LOGIN
loginForm.addEventListener("submit", function(e){

    e.preventDefault();

    const formData = new FormData(loginForm);

    fetch("/api/login/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            window.location.href = "/dashboard/";
        } else {
            mensagem.innerHTML = `<div class="alert alert-danger">Login inválido</div>`;
        }

    });

});


// CADASTRO
cadastroForm.addEventListener("submit", function(e){

    e.preventDefault();

    const termos = document.getElementById("termos");

    // valida LGPD
    if(!termos.checked){
        mensagem.innerHTML = `<div class="alert alert-danger">Aceite os termos</div>`;
        return;
    }

    const formData = new FormData(cadastroForm);
    formData.append("aceitou", true);

    fetch("/api/cadastro/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            window.location.href = "/dashboard/";
        } else {
            mensagem.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }

    });

});

document.getElementById('cep').addEventListener('blur', function(){

    const cep = this.value;

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(data => {

        document.getElementById('endereco').value = data.logradouro || "";
        document.getElementById('cidade').value = data.localidade || "";
        document.getElementById('estado').value = data.uf || "";

    });

});

</script>

</body>

</html>
