<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #396afc, #2948ff);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
}
</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-3">Login</h3>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Usuário" class="form-control mb-3">

<input type="password" name="password" placeholder="Senha" class="form-control mb-3">

<button type="submit" class="btn btn-primary w-100">
Entrar
</button>

</form>

</div>

</body>
</html>
