<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* FUNDO */
body {
    background: linear-gradient(135deg, #396afc, #2948ff);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card-cadastro {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* INPUT ANIMAÇÃO */
.form-control {
    transition: all 0.2s ease;
}

.form-control:focus {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    border-color: #396afc;
}

/* BOTÃO */
.btn-premium {
    background: linear-gradient(135deg, #11998e, #38ef7d);
    border: none;
    font-weight: 500;
    transition: 0.2s;
}

.btn-premium:hover {
    transform: scale(1.03);
}

</style>

</head>

<body>

<div class="card-cadastro">

<h3 class="text-center mb-3">Criar Conta</h3>

<!-- MENSAGENS -->
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>

<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

<!-- SENHA -->
<input type="password" name="password" id="password" class="form-control mb-1" placeholder="Senha" required>

<!-- INDICADOR -->
<div id="forcaSenha" style="font-size:14px; margin-bottom:10px;"></div>

<!-- CONFIRMAR SENHA -->
<input type="password" name="confirmar" id="confirmar" class="form-control mb-3" placeholder="Confirmar senha" required>

<!-- CEP -->
<input type="text" id="cep" class="form-control mb-2" placeholder="CEP">

<input type="text" id="endereco" class="form-control mb-2" placeholder="Endereço">

<input type="text" id="cidade" class="form-control mb-2" placeholder="Cidade">

<input type="text" id="estado" class="form-control mb-3" placeholder="Estado">

<button class="btn btn-premium w-100 text-white">
Cadastrar
</button>

</form>

<p class="text-center mt-3">
Já tem conta? <a href="/login">Entrar</a>
</p>

</div>

<!-- VIA CEP -->
<script>

document.getElementById('cep').addEventListener('blur', function() {

    const cep = this.value;

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(response => response.json())
    .then(data => {

        document.getElementById('endereco').value = data.logradouro || "";
        document.getElementById('cidade').value = data.localidade || "";
        document.getElementById('estado').value = data.uf || "";

    });

});

</script>

<!-- SCRIPT SENHA FORÇA -->
<script>

const senha = document.getElementById("password");
const forcaSenha = document.getElementById("forcaSenha");

senha.addEventListener("input", function() {

    const valor = senha.value;
    let forca = 0;

    if (valor.length >= 6) forca++;
    if (/[0-9]/.test(valor)) forca++;
    if (/[a-zA-Z]/.test(valor)) forca++;
    if (/[^a-zA-Z0-9]/.test(valor)) forca++;

    if (valor.length === 0) {
        forcaSenha.innerHTML = "";
        return;
    }

    if (forca <= 1) {
        forcaSenha.innerHTML = "Senha fraca";
        forcaSenha.style.color = "red";
    } else if (forca <= 3) {
        forcaSenha.innerHTML = "Senha média";
        forcaSenha.style.color = "orange";
    } else {
        forcaSenha.innerHTML = "Senha forte ✔";
        forcaSenha.style.color = "green";
    }

});

</script>

<!-- SCRIPT VALIDAR CONFIRMAÇÃO -->
<script>

const confirmar = document.getElementById("confirmar");

confirmar.addEventListener("input", function(){

    if (confirmar.value !== senha.value) {
        confirmar.style.borderColor = "red";
    } else {
        confirmar.style.borderColor = "green";
    }

});

</script>

</body>

</html>
