{% extends 'base.html' %}
<!-- herda o layout principal -->

{% block content %}

<h2>Categorias</h2>

<a href="/categorias/criar" class="btn btn-success mb-3">
Nova Categoria
</a>
<!-- botão para criar nova categoria -->

<table class="table table-striped">
<!-- tabela Bootstrap -->

<thead>

<tr>
<th>Nome</th>
</tr>

</thead>

<tbody>

{% for categoria in categorias %}

<tr>
<td>{{ categoria.nome }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
