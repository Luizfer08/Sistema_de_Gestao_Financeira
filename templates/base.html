<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8"> <!-- define codificação da página -->

<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- permite responsividade -->

<title>Sistema de Gestão Financeira</title> <!-- título do sistema -->


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- importa o framework Bootstrap para estilização da interface -->

</head>


<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<!-- cria uma barra de navegação no topo do sistema -->

<div class="container">

<a class="navbar-brand" href="/dashboard">Gestão Financeira</a>
<!-- nome do sistema e link para o dashboard -->


<div class="collapse navbar-collapse">

<ul class="navbar-nav">

<li class="nav-item">

<a class="nav-link" href="/dashboard">Dashboard</a>
<!-- link para o dashboard -->

</li>


<li class="nav-item">

<a class="nav-link" href="/categorias">Categorias</a>
<!-- link para categorias -->

</li>

</ul>

</div>

</div>

</nav>


<div class="container mt-4">
<!-- área onde cada página do sistema será exibida -->

{% block content %}
{% endblock %}

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- importa scripts do Bootstrap -->

</body>

</html>
