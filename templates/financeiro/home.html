{% extends 'financeiro/base.html' %}


{% block content %}

{% load static %}


<!-- CSS -->
<link rel="stylesheet"
    href="{% static 'financeiro/css/auth.css' %}">


<!-- JAVASCRIPT -->
<script src="{% static 'financeiro/js/auth.js' %}">
</script>


<!-- CONTAINER PRINCIPAL -->
<div class="d-flex justify-content-center align-items-center"
    style="height: 80vh;">


    <!-- CARD DE AUTENTICAÇÃO -->
    <div class="card-auth">


        <!-- TÍTULO -->
        <h3 class="text-center mb-3">

            Sistema Financeiro

        </h3>


        <!-- MENSAGENS -->
        <div id="mensagem"></div>


        <!-- FORMULÁRIO LOGIN -->
        <form id="formLogin">

            {% csrf_token %}


            <!-- USUÁRIO -->
            <input type="text"
                name="username"
                class="form-control mb-2"
                placeholder="Usuário"
                required>


            <!-- SENHA -->
            <input type="password"
                name="password"
                class="form-control mb-2"
                placeholder="Senha"
                required>


            <!-- BOTÃO -->
            <button class="btn btn-primary w-100">

                Entrar

            </button>

        </form>


        <!-- FORMULÁRIO CADASTRO -->
        <form id="formCadastro"
            class="hidden">

            {% csrf_token %}


            <!-- USUÁRIO -->
            <input type="text"
                name="username"
                class="form-control mb-2"
                placeholder="Usuário"
                required>


            <!-- EMAIL -->
            <input type="email"
                name="email"
                class="form-control mb-2"
                placeholder="Email"
                required>


            <!-- SENHA -->
            <input type="password"
                name="password"
                class="form-control mb-2"
                placeholder="Senha"
                required>


            <!-- CEP -->
            <input type="text"
                id="cep"
                class="form-control mb-2"
                placeholder="CEP">


            <!-- ENDEREÇO -->
            <input type="text"
                id="endereco"
                class="form-control mb-2"
                placeholder="Endereço">


            <!-- CIDADE -->
            <input type="text"
                id="cidade"
                class="form-control mb-2"
                placeholder="Cidade">


            <!-- ESTADO -->
            <input type="text"
                id="estado"
                class="form-control mb-2"
                placeholder="Estado">


            <!-- TERMOS -->
            <div class="form-check text-start mb-2">

                <input class="form-check-input"
                    type="checkbox"
                    id="termos">

                <label class="form-check-label">

                    Aceito os termos de uso

                </label>

            </div>


            <!-- BOTÃO -->
            <button class="btn btn-success w-100">

                Cadastrar

            </button>

        </form>


        <!-- TOGGLE LOGIN / CADASTRO -->
        <p class="text-center mt-3">

            <a href="#"
                onclick="toggleForm()"
                id="toggleText">

                Criar conta

            </a>

        </p>

    </div>

</div>

{% endblock %}
