{% extends 'financeiro/base.html' %}

{% block content %}

{% load static %}
<link rel="stylesheet" href="{% static 'financeiro/css/auth.css' %}">
<script src="{% static 'financeiro/js/auth.js' %}"></script>

<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">

<div class="card-auth">

<h3 class="text-center mb-3">Sistema Financeiro</h3>

<div id="mensagem"></div>

<!-- LOGIN -->
<form id="formLogin">

{% csrf_token %}

<input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>

<input type="password" name="password" class="form-control mb-2" placeholder="Senha" required>

<button class="btn btn-primary w-100">Entrar</button>

</form>


<!-- CADASTRO -->
<form id="formCadastro" class="hidden">

{% csrf_token %}

<input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>

<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

<input type="password" name="password" class="form-control mb-2" placeholder="Senha" required>

<!-- CEP -->
<input type="text" id="cep" class="form-control mb-2" placeholder="CEP">

<input type="text" id="endereco" class="form-control mb-2" placeholder="Endereço">

<input type="text" id="cidade" class="form-control mb-2" placeholder="Cidade">

<input type="text" id="estado" class="form-control mb-2" placeholder="Estado">

<!-- LGPD -->
<div class="form-check text-start mb-2">
    <input class="form-check-input" type="checkbox" id="termos">
    <label class="form-check-label">
        Aceito os termos de uso
    </label>
</div>

<button class="btn btn-success w-100">Cadastrar</button>

</form>

<!-- TOGGLE -->
<p class="text-center mt-3">
<a href="#" onclick="toggleForm()" id="toggleText">
Criar conta
</a>
</p>

</div>
</div>

{% endblock %}
