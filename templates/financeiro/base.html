{% load static %}
<!-- permite usar arquivos estáticos -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão Financeira</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS próprio -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="background-color: #f4f6f9;">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <!-- LOGO -->
            <a class="navbar-brand" href="{% url 'financeiro:home' %}">
                Gestão Financeira
            </a>

            <!-- BOTÃO MOBILE -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- MENU -->
            <div class="collapse navbar-collapse" id="menu">

                {% if user.is_authenticated %}

                <!-- MENU PRINCIPAL -->
                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'financeiro:dashboard' %}">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'financeiro:listar_receitas' %}">
                            Receitas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'financeiro:listar_despesas' %}">
                            Despesas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'financeiro:listar_categorias' %}">
                            Categorias
                        </a>
                    </li>

                </ul>

                <!-- USUÁRIO -->
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <span class="nav-link">
                             {{ user.username }}
                        </span>
                    </li>

                    <!-- LOGOUT (SEGURO - POST) -->
                    <li class="nav-item">
                        <form action="{% url 'financeiro:logout' %}" method="POST" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link text-white" style="text-decoration:none;">
                                Sair
                            </button>
                        </form>
                    </li>

                </ul>

                {% else %}

                <!-- NÃO LOGADO -->
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'financeiro:login' %}">
                            Login
                        </a>
                    </li>

                </ul>

                {% endif %}

            </div>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <div class="container mt-4">

        {% block content %}
        <!-- conteúdo das páginas -->
        {% endblock %}

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
