{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Financeira</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'financeiro/css/style.css' %}">
</head>

<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'financeiro:dashboard' %}">
            Gestão Financeira
        </a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'financeiro:dashboard' %}">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'financeiro:listar_receitas' %}">Receitas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'financeiro:listar_despesas' %}">Despesas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'financeiro:listar_categorias' %}">Categorias</a>
                </li>

            </ul>

            <ul class="navbar-nav">

                <li class="nav-item">
                    <span class="nav-link"> {{ user.username }}</span>
                </li>

                <li class="nav-item">
                    <form action="{% url 'financeiro:logout' %}" method="POST">
                        {% csrf_token %}
                        <button class="btn btn-link nav-link">Sair</button>
                    </form>
                </li>

            </ul>

        </div>

    </div>
</nav>
{% endif %}

            </ul>

        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
