{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Financeira</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'financeiro/css/style.css' %}?v=3">
</head>

<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand" href="{% url 'financeiro:dashboard' %}">
            Gestão Financeira
        </a>

        <!-- BOTÃO MOBILE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNavbar">

            <ul class="navbar-nav me-auto align-items-center gap-3">

                <li class="nav-item">
                    <a class="nav-link nav-item-custom {% if request.path == '/dashboard/' %}active{% endif %}" 
                       href="{% url 'financeiro:dashboard' %}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link nav-item-custom {% if '/receitas' in request.path %}active{% endif %}" 
                       href="{% url 'financeiro:listar_receitas' %}">
                        Receitas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link nav-item-custom {% if '/despesas' in request.path %}active{% endif %}" 
                       href="{% url 'financeiro:listar_despesas' %}">
                        Despesas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link nav-item-custom {% if '/categorias' in request.path %}active{% endif %}" 
                       href="{% url 'financeiro:listar_categorias' %}">
                        Categorias
                    </a>
                </li>

            </ul>

            <div class="d-flex align-items-center gap-3">

                <span class="user-name">
                    {{ request.user.username }}
                </span>

                <form action="{% url 'financeiro:logout' %}" method="POST">
                    {% csrf_token %}
                    <button class="btn btn-logout">
                        Sair
                    </button>
                </form>

            </div>

        </div>
    </div>
</nav>
{% endif %}

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
