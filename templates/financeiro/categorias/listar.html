{% extends 'financeiro/base.html' %}

{% load static %}

{% block content %}

<div class="container">

    <!-- TOPO -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Categorias</h3>

        <button class="btn btn-success" onclick="toggleForm()">
            + Nova Categoria
        </button>
    </div>

    <!-- FORM INLINE -->
    <div id="containerFormCategoria" class="card p-3 mb-3 shadow-sm" style="display: none;">

        <form id="formCategoria">
            {% csrf_token %}

            <div class="row align-items-end">

                <div class="col-md-6">
                    <label class="form-label">Nome da categoria</label>
                    <input type="text" name="nome" id="nomeCategoria" class="form-control" required>
                </div>

                <div class="col-md-6 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-success">
                        Salvar
                    </button>

                    <button type="button" class="btn btn-secondary" onclick="toggleForm()">
                        Cancelar
                    </button>
                </div>

            </div>
        </form>

    </div>

    <!-- LISTA -->
    {% if categorias %}

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Nome</th>
                <th style="width: 180px;">Ações</th>
            </tr>
        </thead>

        <tbody id="tabelaCategorias">

        {% for c in categorias %}
        <tr id="linha-{{ c.id }}">

            <td id="nome-{{ c.id }}">
                {{ c.nome }}
            </td>

            <td>

                <button class="btn btn-warning btn-sm" onclick="editarInline({{ c.id }})">
                    Editar
                </button>

                <button class="btn btn-danger btn-sm" onclick="excluirCategoria({{ c.id }})">
                    Excluir
                </button>

            </td>

        </tr>
        {% endfor %}

        </tbody>

    </table>

    {% else %}

    <div class="alert alert-info text-center">
        Nenhuma categoria cadastrada
    </div>

    {% endif %}

</div>

<!-- JS -->
<script src="{% static 'financeiro/js/categoria.js' %}"></script>


{% endblock %}
