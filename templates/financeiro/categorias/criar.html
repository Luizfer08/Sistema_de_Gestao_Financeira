{% extends 'financeiro/base.html' %}

{% load static %}

{% block content %}

<div class="container" style="max-width:600px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Nova Categoria</h3>

        <a href="{% url 'financeiro:listar_categorias' %}" class="btn btn-outline-secondary btn-sm">
            Voltar
        </a>
    </div>

    <div class="card p-4 shadow-sm">

        <form id="formCategoria">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nome da categoria</label>
                <input 
                    type="text" 
                    id="nomeCategoria"
                    name="nome" 
                    class="form-control" 
                    placeholder="Ex: Alimentação" 
                    required
                >
            </div>

            <div class="d-flex justify-content-end gap-2">

                <a href="{% url 'financeiro:listar_categorias' %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>

                <button type="submit" class="btn btn-success" id="btnSalvar">
                    Salvar
                </button>

            </div>

        </form>

    </div>

</div>

<script>
    const URL_CRIAR_CATEGORIA = "{% url 'financeiro:criar_categoria' %}";
</script>

<!-- JS -->
<script src="{% static 'financeiro/js/categoria.js' %}"></script>

{% endblock %}
