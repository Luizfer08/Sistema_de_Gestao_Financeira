{% extends 'financeiro/base.html' %}

{% load static %}

{% block content %}


<!-- CONTAINER PRINCIPAL -->
<div class="container"
    style="max-width:600px;">


    <!-- CABEÇALHO -->
    <div class="d-flex justify-content-between align-items-center mb-3">


        <!-- TÍTULO -->
        <h3>

            Nova Categoria

        </h3>

        <!-- BOTÃO VOLTAR -->
        <a href="{% url 'financeiro:listar_categorias' %}"
            class="btn btn-outline-secondary btn-sm">

            Voltar

        </a>

    </div>


    <!-- CARD -->
    <div class="card p-4 shadow-sm">


        <!-- FORMULÁRIO -->
        <form id="formCategoria">

            {% csrf_token %}

            <!-- NOME -->
            <div class="mb-3">

                <label class="form-label">

                    Nome da categoria

                </label>

                <input type="text"
                    id="nomeCategoria"
                    name="nome"
                    class="form-control"
                    placeholder="Ex: Alimentação"
                    required>

            </div>


            <!-- BOTÕES -->
            <div class="d-flex justify-content-end gap-2">


                <!-- CANCELAR -->
                <a href="{% url 'financeiro:listar_categorias' %}"
                    class="btn btn-outline-secondary">

                    Cancelar

                </a>

                <!-- SALVAR -->
                <button type="submit"
                    class="btn btn-success"
                    id="btnSalvar">

                    Salvar

                </button>

            </div>

        </form>

    </div>

</div>


<!-- CONFIGURAÇÕES JAVASCRIPT -->
<script>

    const URL_CRIAR_CATEGORIA =
        "{% url 'financeiro:criar_categoria' %}";

</script>


<!-- JAVASCRIPT -->
<script src="{% static 'financeiro/js/categoria.js' %}">
</script>

{% endblock %}
