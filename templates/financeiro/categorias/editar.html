{% extends 'financeiro/base.html' %}

{% block content %}

<div class="container mt-4">

    <h3>Editar Categoria</h3>

    <form method="POST">
        {% csrf_token %}

        <input 
            type="text" 
            name="nome" 
            class="form-control mb-2" 
            value="{{ categoria.nome }}" 
            required
        >

        <button class="btn btn-primary">
            Salvar
        </button>

    </form>

</div>

{% endblock %}
