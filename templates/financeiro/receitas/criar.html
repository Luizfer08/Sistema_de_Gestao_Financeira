{% extends 'financeiro/base.html' %}
<!-- herda o layout padrão -->

{% block content %}

<div class="container mt-4">

    <h3>Nova Receita</h3>

    <!-- formulário -->
    <form method="POST">
        {% csrf_token %}
        <!-- proteção do Django -->

        <!-- DESCRIÇÃO (TEM QUE SER IGUAL AO MODEL) -->
        <input 
            type="text" 
            name="descricao" 
            class="form-control mb-2" 
            placeholder="Descrição da receita" 
            required
        >

        <!-- VALOR -->
        <input 
            type="number" 
            step="0.01" 
            name="valor" 
            class="form-control mb-2" 
            placeholder="Valor" 
            required
        >

        <!-- CATEGORIA -->
        <select name="categoria" class="form-control mb-2" required>
            <option value="">Selecione uma categoria</option>

            {% for c in categorias %}
                <option value="{{ c.id }}">{{ c.nome }}</option>
            {% endfor %}
        </select>

        <!-- RECORRENTE -->
        <div class="form-check mb-2">
            <input 
                class="form-check-input" 
                type="checkbox" 
                name="recorrente"
            >
            <label class="form-check-label">
                Receita recorrente (mensal)
            </label>
        </div>

        <!-- BOTÃO -->
        <button class="btn btn-success">
            Salvar Receita
        </button>

    </form>

</div>

{% endblock %}
