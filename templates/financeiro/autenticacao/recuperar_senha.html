{% extends 'financeiro/base.html' %}

{% block content %}

<!-- TÍTULO -->
<h3>

    Recuperar Senha

</h3>

<!-- FORMULÁRIO -->
<form method="POST">

    {% csrf_token %}

    <!-- EMAIL -->
    <input type="email"
        name="email"
        class="form-control mb-3"
        placeholder="Digite seu email">

    <!-- BOTÃO -->
    <button class="btn btn-primary">

        Enviar link de recuperação

    </button>

</form>

{% endblock %}
