{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Login - Sistema Financeiro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="{% static 'financeiro/css/auth.css' %}">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">
        <img src="{% static 'financeiro/img/logo.png' %}" alt="logo">
    </div>

    <h6>Sistema Gestão Financeira</h6>

    <!-- ERRO -->
    <div id="erro" class="alert alert-danger d-none"></div>

    <!-- FORM -->
    <form id="formLogin">

        {% csrf_token %}

        <!-- LOGIN -->
        <input 
            type="text" 
            name="username" 
            class="form-control auth-input" 
            placeholder="Login"
            required
        >

        <!-- SENHA -->
        <input 
            type="password" 
            name="password" 
            class="form-control auth-input" 
            placeholder="Senha"
            required
        >

        <button type="submit" class="btn btn-auth">
            Iniciar sessão
        </button>

    </form>

    <!-- LINK -->
     
<p class="mt-3">
    Não tem conta?
    <a href="{% url 'financeiro:cadastro' %}" class="link-cadastro">
        Registre aqui
    </a>
</p>

</div>

</div>

<script>

const form = document.getElementById('formLogin');

form.addEventListener('submit', function(e){

    e.preventDefault();

    const formData = new FormData(form);
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    fetch("{% url 'financeiro:api_login' %}", {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': csrfToken
        },
        credentials: 'same-origin'
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            window.location.href = "{% url 'financeiro:dashboard' %}";
        } else {
            const erro = document.getElementById('erro');
            erro.classList.remove('d-none');
            erro.innerText = "Login inválido";
        }

    });

});

</script>

</body>
</html>
