{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- CONFIGURAÇÕES -->
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <!-- TÍTULO -->
    <title>Login - Sistema Financeiro</title>

    <!-- FONTES -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
        href="{% static 'financeiro/css/auth.css' %}?v=10">

</head>

<body class="auth-login-body">

    <!-- CONTAINER PRINCIPAL -->
    <main class="login-shell">

        <!-- CARD LOGIN -->
        <section class="login-card"
            aria-labelledby="loginTitulo">

            <!-- LOGO -->
            <div class="login-brand">

                <img src="{% static 'financeiro/img/icone.png' %}"
                    alt="">

                <strong>
                    Sistema Gestão Financeira
                </strong>

            </div>

            <!-- TÍTULO -->
            <div class="login-heading">

                <h1 id="loginTitulo">
                    Realize o login para conferir suas finanças
                </h1>

            </div>

            <!-- MENSAGEM DE ERRO -->
            <div id="erro"
                class="login-error d-none">
            </div>

            <!-- FORMULÁRIO -->
            <form id="formLogin"
                class="login-form">

                {% csrf_token %}

                <!-- EMAIL -->
                <label>

                    Email

                    <span class="login-input-wrap">

                        <input type="email"
                            name="email"
                            placeholder="Digite seu email"
                            autocomplete="email"
                            required>

                    </span>

                </label>

                <!-- SENHA -->
                <label>

                    Senha

                    <span class="login-input-wrap">

                        <input id="loginSenha"
                            type="password"
                            name="password"
                            placeholder="Digite sua senha"
                            autocomplete="current-password"
                            required>

                        <!-- MOSTRAR SENHA -->
                        <button class="login-eye"
                            type="button"
                            aria-label="Mostrar senha"
                            data-password-toggle>

                            <img src="{% static 'financeiro/img/baixo.png' %}"
                                alt="">

                        </button>

                    </span>

                </label>

                <!-- OPÇÕES -->
                <div class="login-options">

                    <!-- LEMBRAR LOGIN -->
                    <label class="login-remember">

                        <input type="checkbox"
                            name="remember">

                        Lembrar de mim

                    </label>

                    <!-- RECUPERAR SENHA -->
                    <a href="{% url 'password_reset' %}">
                        Esqueci minha senha
                    </a>

                </div>

                <!-- BOTÃO LOGIN -->
                <button type="submit"
                    class="login-submit">

                    Entrar

                    <img src="{% static 'financeiro/img/seta_direita.png' %}"
                        alt="">

                </button>

            </form>

            <!-- LINK CADASTRO -->
            <p class="login-register">

                Não tem uma conta?

                <a href="{% url 'financeiro:cadastro' %}">
                    Cadastre-se
                </a>

            </p>

            <p class="login-terms-link">
                <a href="{% url 'financeiro:termos' %}">
                    Termos de uso e política de privacidade
                </a>
            </p>

        </section>

    </main>

    <!-- JAVASCRIPT -->
    <script src="{% static 'financeiro/js/login.js' %}?v=3">
    </script>

</body>
</html>
