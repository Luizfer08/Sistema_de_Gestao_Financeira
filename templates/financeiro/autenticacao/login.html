{% extends 'financeiro/base.html' %}
<!-- herda layout principal -->

{% block content %}

<div class="container mt-5" style="max-width: 400px;">

    <h2 class="mb-4 text-center">Login</h2>

    <!-- ALERTA DE ERRO -->
    <div id="erro" class="alert alert-danger d-none"></div>

    <form id="formLogin">

        {% csrf_token %}
        <!-- necessário para CSRF -->

        <!-- USUÁRIO -->
        <div class="mb-3">
            <label>Usuário</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <!-- SENHA -->
        <div class="mb-3">
            <label>Senha</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- BOTÃO -->
        <button type="submit" class="btn btn-primary w-100">
            Entrar
        </button>

    </form>

</div>

<script>
    // pega o formulário
    const form = document.getElementById('formLogin');

    form.addEventListener('submit', function(e) {

        e.preventDefault(); // evita reload da página

        const formData = new FormData(form);

        // pega o token CSRF do input hidden
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        fetch("{% url 'financeiro:api_login' %}", {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': csrfToken  //  envia o CSRF corretamente
            },
            credentials: 'same-origin'  //  necessário para enviar cookie
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Erro na requisição");
            }
            return response.json();
        })
        .then(data => {

            if (data.success) {

                window.location.href = "{% url 'financeiro:dashboard' %}";

            } else {

                const erroDiv = document.getElementById('erro');
                erroDiv.classList.remove('d-none');
                erroDiv.innerText = data.error;

            }

        })
        .catch(error => {
            console.error('Erro:', error);
        });

    });
</script>

{% endblock %}
