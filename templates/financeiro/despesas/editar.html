{% extends 'financeiro/base.html' %}

<!-- HERDA O LAYOUT PRINCIPAL -->

{% block content %}


<!-- TÍTULO -->
<h2 class="mb-4">

    Editar Despesa

</h2>


<!-- FORMULÁRIO -->
<form method="POST">

    {% csrf_token %}
    <!-- PROTEÇÃO CSRF -->


    <!-- DESCRIÇÃO -->
    <div class="mb-3">

        <label class="form-label">

            Descrição

        </label>

        <input type="text"
            name="descricao"
            value="{{ despesa.descricao }}"
            class="form-control"
            required>

    </div>


    <!-- VALOR -->
    <div class="mb-3">

        <label class="form-label">

            Valor

        </label>

        <input type="number"
            step="0.01"
            name="valor"
            value="{{ despesa.valor }}"
            class="form-control"
            required>

    </div>


    <!-- DATA -->
    <div class="mb-3">

        <label class="form-label">

            Data

        </label>

        <input type="date"
            name="data"
            value="{{ despesa.data|date:'Y-m-d' }}"
            class="form-control"
            required>

    </div>


    <!-- CATEGORIA -->
    <div class="mb-3">

        <label class="form-label">

            Categoria

        </label>

        <select name="categoria"
            class="form-control">

            {% for categoria in categorias %}

                <option value="{{ categoria.id }}"
                    {% if categoria.id == despesa.categoria.id %}
                        selected
                    {% endif %}>

                    {{ categoria.nome }}

                </option>

            {% endfor %}

        </select>

    </div>


    <!-- RECORRÊNCIA -->
    <div class="form-check mb-3">

        <input type="checkbox"
            name="recorrente"
            class="form-check-input"

            {% if despesa.recorrente %}
                checked
            {% endif %}>

        <label class="form-check-label">

            Despesa recorrente

        </label>

    </div>


    <!-- DATA FINAL -->
    <div class="mb-3">

        <label class="form-label">

            Data fim (opcional)

        </label>

        <input type="date"
            name="data_fim"
            value="{{ despesa.data_fim|date:'Y-m-d' }}"
            class="form-control">

    </div>


    <!-- BOTÕES -->
    <button type="submit"
        class="btn btn-warning">

        Salvar Alterações

    </button>


    <!-- CANCELAR -->
    <a href="{% url 'financeiro:listar_despesas' %}"
        class="btn btn-secondary">

        Cancelar

    </a>

</form>

{% endblock %}
