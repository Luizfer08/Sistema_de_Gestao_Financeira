{% extends 'financeiro/base.html' %}

{% block content %}

<div class="container mt-4">

<h2>Nova Despesa</h2>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-3">
    <label>Descrição</label>
    <input 
        type="text" 
        name="descricao" 
        class="form-control" 
        required
    >
</div>

<div class="mb-3">
    <label>Valor</label>
    <input 
        type="number" 
        step="0.01" 
        name="valor" 
        class="form-control" 
        required
    >
</div>

<!-- DATA -->
<div class="mb-3">
    <label>Data</label>
    <input 
        type="date" 
        name="data" 
        class="form-control" 
        required
    >
</div>

<div class="mb-3">
    <label>Categoria</label>
    <select 
        name="categoria" 
        class="form-control"
        required
    >
        <option value="">Selecione uma categoria</option>

        {% for categoria in categorias %}
            <option value="{{ categoria.id }}">
                {{ categoria.nome }}
            </option>
        {% endfor %}
    </select>
</div>

<div class="form-check mb-3">
    <input 
        type="checkbox" 
        name="recorrente" 
        class="form-check-input"
    >
    <label class="form-check-label">
        Despesa recorrente
    </label>
</div>

<div class="mb-3">
    <label>Data fim (opcional)</label>
    <input 
        type="date" 
        name="data_fim" 
        class="form-control"
    >
</div>

<!-- BOTÃO -->
<button type="submit" class="btn btn-danger">
    Salvar
</button>

</form>

</div>

{% endblock %}
